name: Build working FaceSwap Pro APK

on:
  workflow_dispatch:
  push:
    branches: [master, main, install-ready, apk-build]
    paths:
      - "**.py"
      - "assets/**"
      - "buildozer.spec"
      - ".github/workflows/build_apk.yml"
  pull_request:
    branches: [master]

concurrency:
  group: faceswappro-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Compile ARM64 Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 300

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Android build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ant autoconf automake autopoint build-essential ccache cmake gettext git \
            lbzip2 libffi-dev libltdl-dev libncurses5-dev libncursesw5-dev \
            libssl-dev libtool patch pkg-config python3-dev unzip wget zip zlib1g-dev

      - name: Install Buildozer toolchain
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "buildozer==1.6.0" "cython==0.29.37"
          buildozer --version
          cython --version

      - name: Pin compatible python-for-android
        run: |
          mkdir -p .buildozer/android/platform
          git clone https://github.com/kivy/python-for-android.git \
            .buildozer/android/platform/python-for-android
          cd .buildozer/android/platform/python-for-android
          git checkout 5d5ca2b57aa49c508950c927eb42d2ffe14c3cf6
          grep -q "version = '3.11.5'" pythonforandroid/recipes/python3/__init__.py
          grep -q 'RECOMMENDED_NDK_VERSION = "25b"' pythonforandroid/recommendations.py

      - name: Bundle OpenCV face detector
        run: |
          mkdir -p assets
          curl --fail --location --retry 3 \
            https://raw.githubusercontent.com/opencv/opencv/4.12.0/data/haarcascades/haarcascade_frontalface_alt2.xml \
            --output assets/haarcascade_frontalface_alt2.xml
          test -s assets/haarcascade_frontalface_alt2.xml

      - name: Fix Android MediaStore integer overload
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("main.py")
          text = path.read_text(encoding="utf-8")
          marker = '    ContentValues = autoclass("android.content.ContentValues")\n'
          integer_line = '    JavaInteger = autoclass("java.lang.Integer")\n'
          if integer_line not in text:
              if marker not in text:
                  raise SystemExit("ContentValues marker was not found")
              text = text.replace(marker, marker + integer_line, 1)
          text = text.replace(
              "values.put(MediaColumns.IS_PENDING, 1)",
              "values.put(MediaColumns.IS_PENDING, JavaInteger.valueOf(1))",
          )
          text = text.replace(
              "ready.put(MediaColumns.IS_PENDING, 0)",
              "ready.put(MediaColumns.IS_PENDING, JavaInteger.valueOf(0))",
          )
          path.write_text(text, encoding="utf-8")
          PY

      - name: Validate source files
        run: |
          python -m py_compile main.py faceswap.py
          grep -q "def process_video" faceswap.py
          grep -q "JavaInteger.valueOf(1)" main.py
          grep -q "JavaInteger.valueOf(0)" main.py
          grep -q "requirements = .*opencv" buildozer.spec
          grep -q "ffpyplayer_codecs" buildozer.spec
          grep -q "version = 1.3.9" buildozer.spec
          grep -q "android.api = 36" buildozer.spec
          grep -q "android.ndk = 25b" buildozer.spec
          grep -q "p4a.source_dir = .buildozer/android/platform/python-for-android" buildozer.spec

      - name: Build debug APK
        id: android_build
        env:
          USE_CCACHE: "1"
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        shell: bash
        run: |
          set +e
          yes | buildozer -v android debug 2>&1 | tee build.log
          status=${PIPESTATUS[1]}
          tail -n 1200 build.log > BUILD_LOG_TAIL.txt
          exit "$status"

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FaceSwapPro-build-diagnostics
          path: |
            BUILD_LOG_TAIL.txt
            build.log
          if-no-files-found: warn
          retention-days: 7

      - name: Verify generated package
        run: |
          test -n "$(find bin -maxdepth 1 -name '*.apk' -print -quit)"
          ls -lh bin/*.apk
          sha256sum bin/*.apk | tee APK_SHA256.txt

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: FaceSwapPro-working-arm64-apk
          path: |
            bin/*.apk
            APK_SHA256.txt
          if-no-files-found: error
          retention-days: 30
