name: Build working FaceSwap Pro APK

on:
  workflow_dispatch:
  push:
    branches: [master, main, install-ready, apk-build]
    paths:
      - "**.py"
      - "assets/**"
      - "buildozer.spec"
      - ".github/workflows/build_apk.yml"
  pull_request:
    branches: [master]

concurrency:
  group: faceswappro-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Compile ARM64 Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 300

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Android build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ant autoconf automake autopoint build-essential ccache cmake gettext git \
            lbzip2 libffi-dev libltdl-dev libncurses5-dev libncursesw5-dev \
            libssl-dev libtool patch pkg-config python3-dev unzip wget zip zlib1g-dev

      - name: Install Buildozer toolchain
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "buildozer==1.6.0" "cython==0.29.37"
          buildozer --version
          cython --version

      - name: Bundle OpenCV face detector
        run: |
          mkdir -p assets
          curl --fail --location --retry 3 \
            https://raw.githubusercontent.com/opencv/opencv/4.12.0/data/haarcascades/haarcascade_frontalface_alt2.xml \
            --output assets/haarcascade_frontalface_alt2.xml
          test -s assets/haarcascade_frontalface_alt2.xml

      - name: Validate source files
        run: |
          python -m py_compile main.py faceswap.py
          grep -q "def process_video" faceswap.py
          grep -q "requirements = .*opencv" buildozer.spec
          grep -q "ffpyplayer_codecs" buildozer.spec
          grep -q "android.api = 36" buildozer.spec
          grep -q "android.ndk = 28c" buildozer.spec

      - name: Build debug APK
        id: android_build
        env:
          USE_CCACHE: "1"
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        shell: bash
        run: |
          set +e
          yes | buildozer -v android debug 2>&1 | tee build.log
          status=${PIPESTATUS[1]}
          tail -n 1200 build.log > BUILD_LOG_TAIL.txt
          exit "$status"

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FaceSwapPro-build-diagnostics
          path: |
            BUILD_LOG_TAIL.txt
            build.log
          if-no-files-found: warn
          retention-days: 7

      - name: Verify generated package
        run: |
          test -n "$(find bin -maxdepth 1 -name '*.apk' -print -quit)"
          ls -lh bin/*.apk
          sha256sum bin/*.apk | tee APK_SHA256.txt

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: FaceSwapPro-working-arm64-apk
          path: |
            bin/*.apk
            APK_SHA256.txt
          if-no-files-found: error
          retention-days: 30
