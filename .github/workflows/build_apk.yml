name: Build working FaceSwap Pro APK

on:
  workflow_dispatch:
  push:
    branches: [master, main, install-ready, apk-build]
    paths:
      - "**.py"
      - "assets/**"
      - "buildozer.spec"
      - ".github/workflows/build_apk.yml"
  pull_request:
    branches: [master]

concurrency:
  group: faceswappro-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Compile ARM64 Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Bundle OpenCV face detector
        run: |
          mkdir -p assets
          curl --fail --location --retry 3 \
            https://raw.githubusercontent.com/opencv/opencv/4.12.0/data/haarcascades/haarcascade_frontalface_alt2.xml \
            --output assets/haarcascade_frontalface_alt2.xml
          test -s assets/haarcascade_frontalface_alt2.xml

      - name: Validate source files
        run: |
          python3 -m py_compile main.py faceswap.py
          grep -q "def process_video" faceswap.py
          grep -q "requirements = .*opencv" buildozer.spec

      - name: Build APK with Buildozer
        id: buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          command: buildozer -v android debug
          workdir: .
          buildozer_version: stable

      - name: Verify generated package
        run: |
          test -n "$(find bin -maxdepth 1 -name '*.apk' -print -quit)"
          ls -lh bin/*.apk
          sha256sum bin/*.apk | tee APK_SHA256.txt

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: FaceSwapPro-working-arm64-apk
          path: |
            bin/*.apk
            APK_SHA256.txt
          if-no-files-found: error
          retention-days: 30
